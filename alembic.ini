# Конфигурация Alembic для миграций Evergreen.
#
# URL базы НЕ хардкодим здесь — env.py берёт его из product.config.DATABASE_URL
# (env EVERGREEN_DATABASE_URL), чтобы один источник правды и для приложения,
# и для миграций. Запуск:  alembic upgrade head
[alembic]
script_location = alembic
prepend_sys_path = .
# Имя файла ревизии: <дата>_<слаг>.py — удобно читать историю.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
